name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      GEMINI_API_KEY: test-gemini-key
      MOTIONCODE_INTERNAL_ADMIN_EMAILS: admin@example.com
      MOTIONCODE_INTERNAL_ADMIN_USER_IDS: 00000000-0000-4000-8000-000000000000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      NEXT_PUBLIC_SUPABASE_URL: https://motioncode-ci.supabase.co
      STRIPE_PRO_PRICE_ID: price_pro_test
      STRIPE_SECRET_KEY: sk_test_motioncode
      STRIPE_STUDIO_PRICE_ID: price_studio_test
      STRIPE_WEBHOOK_SECRET: whsec_motioncode
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: |
          npm audit --omit=dev --audit-level=moderate || {
            echo "npm audit failed; review docs/ops/audit-exceptions.md"
            test -f docs/ops/audit-exceptions.md
          }
