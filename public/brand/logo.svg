    <radialGradient id="mint" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9ef0c0" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#9ef0c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="peach" cx="50%" cy="50%" r="50%">
