               C 178 336 178 362 210 362"/>
      <!-- right brace } -->
      <path d="M302 150
               C 334 150 334 176 334 200
               C 334 232 334 240 362 256
               C 334 272 334 280 334 312
               C 334 336 334 362 302 362"/>
    </g>
